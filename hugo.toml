baseURL = 'https://daidaiwoma.github.io/'
languageCode = 'zh-cn'
title = 'Gopher.log'
theme = 'PaperMod'

[params]
    defaultTheme = "dark"
    env = "production"
    author = "daidaiwoma"
    description = "专注于 Go 语言后端与 AI 应用开发的技术博客"

    ShowReadingTime = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowShareButtons = false
    ShowRssButtonInSectionTermList = false

    [params.homeInfoParams]
        Title = "欢迎来到我的空间."
        Content = "Java & Go 语言后端 与 AI 应用开发"

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/daidaiwoma"

    [[params.socialIcons]]
        name = "rss"
        url = "/index.xml"

# 导航栏配置
[[menu.main]]
    name = "~/posts"
    url = "/posts/"
    weight = 10
